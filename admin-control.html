<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Control | DI.Fireworks</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-di">DI</span><span class="logo-dot">.</span><span class="logo-fw">Fireworks</span>
    </div>
    <h2>Admin Control Panel</h2>
    <p class="login-sub">Authorized Personnel Only</p>
    <div class="login-form">
      <div class="login-field">
        <i class="fas fa-user"></i>
        <input type="text" id="admin-user" placeholder="Username" autocomplete="off"/>
      </div>
      <div class="login-field">
        <i class="fas fa-lock"></i>
        <input type="password" id="admin-pass" placeholder="Password"/>
      </div>
      <div id="login-error" class="login-error"></div>
      <button class="login-btn" onclick="adminLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dashboard" style="display:none">

  <!-- ADMIN NAVBAR -->
  <nav class="admin-nav">
    <div class="admin-logo">
      <span class="logo-di">DI</span><span class="logo-dot">.</span><span class="logo-fw">Fireworks</span>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="admin-nav-links">
      <button class="admin-nav-btn active" onclick="showTab('products')"><i class="fas fa-box"></i> Products</button>
      <button class="admin-nav-btn" onclick="showTab('reviews')"><i class="fas fa-star"></i> Reviews</button>
      <button class="admin-nav-btn" onclick="showTab('add')"><i class="fas fa-plus-circle"></i> Add Product</button>
    </div>
    <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </nav>

  <!-- TAB: ADD PRODUCT -->
  <div class="admin-tab" id="tab-add" style="display:none">
    <div class="tab-header">
      <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
    </div>
    <div class="add-product-form">
      <div class="ap-grid">
        <div class="ap-field">
          <label>Product Name *</label>
          <input type="text" id="ap-name" placeholder="e.g. Super 100 Shooter"/>
        </div>
        <div class="ap-field">
          <label>Icon (emoji)</label>
          <input type="text" id="ap-icon" placeholder="🎆" maxlength="4"/>
        </div>
        <div class="ap-field">
          <label>Category *</label>
          <select id="ap-category">
            <option value="Pakistani">Pakistani Products</option>
            <option value="Chinese">China Products</option>
            <option value="Birthday">Birthday Items</option>
          </select>
        </div>
        <div class="ap-field">
          <label>Sub-Category</label>
          <input type="text" id="ap-subcat" placeholder="e.g. 100 Shooters"/>
        </div>
        <div class="ap-field">
          <label>Stock Quantity *</label>
          <input type="number" id="ap-stock" placeholder="100" min="0"/>
        </div>
        <div class="ap-field">
          <label>Wrong Price (Strikethrough) *</label>
          <input type="text" id="ap-wrong-price" placeholder="Rs. 2500"/>
        </div>
        <div class="ap-field">
          <label>Discount % *</label>
          <input type="number" id="ap-discount-pct" placeholder="25" min="0" max="99" oninput="calcFinalPrice()"/>
        </div>
        <div class="ap-field">
          <label>Final Price (Auto Calculated)</label>
          <input type="text" id="ap-final-price" placeholder="Rs. 1875" readonly style="background:rgba(0,0,0,0.3);cursor:not-allowed;"/>
        </div>
      </div>
      <div id="ap-msg" class="ap-msg"></div>
      <button class="ap-submit-btn" onclick="addProduct()"><i class="fas fa-save"></i> Save Product</button>
    </div>
  </div>

  <!-- TAB: PRODUCTS -->
  <div class="admin-tab" id="tab-products">
    <div class="tab-header">
      <h2><i class="fas fa-box"></i> Manage Products</h2>
      <div class="tab-header-right">
        <span id="products-count" class="count-badge">0 Products</span>
      </div>
    </div>
    <div class="admin-products-grid" id="admin-products-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- TAB: REVIEWS -->
  <div class="admin-tab" id="tab-reviews" style="display:none">
    <div class="tab-header">
      <h2><i class="fas fa-star"></i> Manage Reviews</h2>
      <span id="reviews-count" class="count-badge">0 Reviews</span>
    </div>
    <div class="admin-reviews-list" id="admin-reviews-list">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
